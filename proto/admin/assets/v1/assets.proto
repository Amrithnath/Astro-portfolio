syntax = "proto3";

package admin.assets.v1;

option go_package = "github.com/Amrithnath/Astro-portfolio/wedding-api/internal/gen/admin/assets/v1;adminassetsv1";

service AdminAssetsService {
  rpc ListAssets(ListAssetsRequest) returns (ListAssetsResponse);
  rpc CreateAssetUpload(CreateAssetUploadRequest) returns (CreateAssetUploadResponse);
  rpc DeleteAsset(DeleteAssetRequest) returns (DeleteAssetResponse);
}

message Asset {
  string id = 1;
  string kind = 2;
  string title = 3;
  string public_url = 4;
  int64 created_at_unix = 5;
}

message ListAssetsRequest {}
message ListAssetsResponse { repeated Asset assets = 1; }
message CreateAssetUploadRequest {
  string file_name = 1;
  string content_type = 2;
  string kind = 3;
}
message CreateAssetUploadResponse {
  string asset_id = 1;
  string upload_url = 2;
  string public_url = 3;
}
message DeleteAssetRequest { string asset_id = 1; }
message DeleteAssetResponse {}
