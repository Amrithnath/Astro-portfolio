syntax = "proto3";

package upload.v1;

option go_package = "github.com/Amrithnath/Astro-portfolio/wedding-api/internal/gen/upload/v1;uploadv1";

service UploadService {
  rpc InitUpload(InitUploadRequest) returns (InitUploadResponse);
  rpc UploadChunk(UploadChunkRequest) returns (UploadChunkResponse);
}

enum MediaStorageProvider {
  MEDIA_STORAGE_PROVIDER_UNSPECIFIED = 0;
  MEDIA_STORAGE_PROVIDER_GOOGLE_DRIVE = 1;
  MEDIA_STORAGE_PROVIDER_GOOGLE_PHOTOS = 2;
}

message InitUploadRequest {
  string filename = 1;
  string mime_type = 2;
  int64 file_size = 3;
}

message InitUploadResponse {
  string upload_id = 1;
  int64 chunk_bytes = 2;
  int64 max_file_bytes = 3;
  int64 expires_at_unix = 4;
  MediaStorageProvider provider = 5;
}

message UploadChunkRequest {
  string upload_id = 1;
  int64 offset = 2;
  string content_range = 3;
  bytes chunk = 4;
}

message UploadChunkResponse {
  int64 next_offset = 1;
  bool complete = 2;
  string provider_resource_id = 3;
}
